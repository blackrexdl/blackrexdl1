name: Update README GIF

on:
  schedule:
    - cron: "0 */6 * * *"   # runs every 6 hours
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node (only needed if your script uses Node)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install dependencies (only if you use packages)
      - name: Install dependencies
        run: npm install || true

      # 4. Run your generator script
      - name: Generate GIF
        run: node scripts/generate.js

      # 5. Commit and push output
      - name: Commit & Push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add out/readme.gif

          git commit -m "chore: update readme gif" || echo "No changes to commit"

          git push origin main